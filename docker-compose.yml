services:

  # PostgreSQL guarda usuarios, horarios, ausencias y la configuracion de Celery Beat.
  db:
    image: postgres:16-alpine
    container_name: horarium_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horarium}
      POSTGRES_USER: ${POSTGRES_USER:-horarium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horarium123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horarium}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis hace de cola para Celery; no guarda datos importantes del proyecto.
  redis:
    image: redis:7-alpine
    container_name: horarium_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Django. Al arrancar aplica migraciones y deja creada la tarea diaria.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horarium_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py setup_periodic_tasks &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: horarium.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker que ejecuta tareas en segundo plano, como generar PDFs.
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horarium_celery_worker
    command: celery -A horarium worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: horarium.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Planificador: despierta la tarea de partes a las 08:00 en dias lectivos.
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horarium_celery_beat
    command: celery -A horarium beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: horarium.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Angular compilado y servido con Nginx.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: horarium_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
