<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-3">Recuperar contraseña</h4>

          <form (ngSubmit)="onSubmit()" #f="ngForm">
            <div class="mb-3">
              <label for="email" class="form-label">Correo electronico</label>
              <input
                id="email"
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required
                autocomplete="email"
              />
            </div>

            @if (error) {
              <div class="alert alert-danger py-2 small">{{ error }}</div>
            }
            @if (mensaje) {
              <div class="alert alert-success py-2 small">{{ mensaje }}</div>
            }

            <button class="btn btn-primary w-100" [disabled]="loading || !email">
              @if (loading) { <span class="spinner-border spinner-border-sm me-1"></span> }
              Enviar enlace
            </button>
          </form>

          <div class="text-center mt-3">
            <a routerLink="/login" class="small">Volver al login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
