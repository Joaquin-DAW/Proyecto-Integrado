<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-3">Nueva contraseña</h4>

          <form (ngSubmit)="onSubmit()" #f="ngForm">
            <div class="mb-3">
              <label for="nueva_password" class="form-label">Nueva contraseña</label>
              <input
                id="nueva_password"
                [type]="mostrarPasswords ? 'text' : 'password'"
                class="form-control"
                [(ngModel)]="form.nueva_password"
                name="nueva_password"
                required
                autocomplete="new-password"
              />
              <div class="small mt-2">
                @for (regla of passwordChecks; track regla.texto) {
                  <div
                    [class.text-success]="regla.ok"
                    [class.text-danger]="form.nueva_password && !regla.ok"
                    [class.text-muted]="!form.nueva_password && !regla.ok"
                  >
                    <span class="fw-semibold">{{ regla.ok ? 'OK' : '-' }}</span>
                    {{ regla.texto }}
                  </div>
                }
              </div>
            </div>

            <div class="mb-3">
              <label for="confirmar" class="form-label">Confirmar contraseña</label>
              <input
                id="confirmar"
                [type]="mostrarPasswords ? 'text' : 'password'"
                class="form-control"
                [class.is-invalid]="passwordsNoCoinciden"
                [(ngModel)]="form.confirmar"
                name="confirmar"
                required
                autocomplete="new-password"
              />
              @if (passwordsNoCoinciden) {
                <div class="invalid-feedback">Las contraseñas no coinciden.</div>
              }
              <div class="form-check mt-2">
                <input
                  id="mostrar-passwords-reset"
                  class="form-check-input"
                  type="checkbox"
                  [(ngModel)]="mostrarPasswords"
                  name="mostrarPasswords"
                />
                <label class="form-check-label small" for="mostrar-passwords-reset">
                  Mostrar contraseñas
                </label>
              </div>
            </div>

            @if (error) {
              <div class="alert alert-danger py-2 small">{{ error }}</div>
            }
            @if (mensaje) {
              <div class="alert alert-success py-2 small">{{ mensaje }}</div>
            }

            <button
              class="btn btn-primary w-100"
              [disabled]="loading || !uid || !token || !passwordValida || passwordsNoCoinciden"
            >
              @if (loading) { <span class="spinner-border spinner-border-sm me-1"></span> }
              Cambiar contraseña
            </button>
          </form>

          <div class="text-center mt-3">
            <a routerLink="/login" class="small">Volver al login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
